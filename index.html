<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b0c" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Notify · Pago con tu banco</title>
  <link rel="preconnect" href="https://js.fintoc.com" crossorigin />
  <link rel="preconnect" href="https://wizard.fintoc.com" crossorigin />
  <style>
    :root {
      --bg: #0b0b0c;
      --surface: #18181b;
      --surface-2: #252530;
      --border: #2a2a30;
      --text: #f4f4f5;
      --muted: #a1a1aa;
      --accent: #e8364f;
      --accent-bg: #33201e;
      --success: #22c55e;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(circle at 20% 0%, rgba(232, 54, 79, 0.08), transparent 50%),
        radial-gradient(circle at 80% 100%, rgba(232, 54, 79, 0.04), transparent 50%),
        var(--bg);
    }

    .card {
      width: 100%;
      max-width: 440px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px 28px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .brand-dot {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--accent-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      font-weight: 700;
      font-size: 14px;
    }
    .brand-name {
      font-weight: 700;
      letter-spacing: 0.3px;
      font-size: 14px;
      color: var(--muted);
      text-transform: uppercase;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin: 0 0 8px;
      letter-spacing: -0.3px;
    }

    p.lead {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
      margin: 0 0 24px;
    }

    button.primary {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: 0;
      padding: 14px 20px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: filter 0.15s ease, transform 0.05s ease;
      font-family: inherit;
    }
    button.primary:hover { filter: brightness(1.08); }
    button.primary:active { transform: translateY(1px); }
    button.primary:disabled {
      background: var(--surface-2);
      color: var(--muted);
      cursor: not-allowed;
      filter: none;
    }

    .status {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.4;
      display: none;
    }
    .status.show { display: block; }
    .status.info    { background: rgba(232, 54, 79, 0.08); color: var(--accent); border: 1px solid rgba(232, 54, 79, 0.2); }
    .status.success { background: rgba(34, 197, 94, 0.10); color: var(--success); border: 1px solid rgba(34, 197, 94, 0.2); }
    .status.error   { background: rgba(239, 68, 68, 0.10); color: var(--danger);  border: 1px solid rgba(239, 68, 68, 0.2); }

    footer {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
      line-height: 1.5;
      text-align: center;
    }

    @media (max-width: 480px) {
      .card { padding: 24px 20px; }
      h1 { font-size: 20px; }
    }
  </style>
</head>
<body>
  <main class="card" role="main">
    <div class="brand">
      <div class="brand-dot">N</div>
      <div class="brand-name">Notify</div>
    </div>

    <h1 id="title">Confirma tu pago</h1>
    <p class="lead" id="lead">Vas a ser redirigido al sitio de tu banco para autorizar la transferencia. El pago se procesa de forma instantánea.</p>

    <button id="pay" class="primary">Pagar con mi banco</button>

    <div class="status" id="status" role="status" aria-live="polite"></div>

    <footer>
      Pago procesado de forma segura por <strong>Fintoc</strong> y <strong>Mercado Pago</strong>.<br>
      Este enlace es de uso único y expira en 10 minutos.
    </footer>
  </main>

  <script src="https://js.fintoc.com/v1"></script>
  <script>
    (function () {
      'use strict';

      // Public key do Fintoc para o merchant "Mercado Pago" no checkout
      // Nike CL. Capturada do header `authorization` do request real ao
      // /internal/v1/widget_config (formato pk_live_*). NAO confundir com a
      // publicKey do Mercado Pago (APP_USR-*) que vem no appPayload do
      // gatewayCallback — essa nao e aceita pelo Fintoc.create().
      const FINTOC_PUBLIC_KEY = 'pk_live_3dbgckKc3uxhHS6WJYyHdkcM3uow_CVQ';

      const params = new URLSearchParams(location.search);
      const widgetToken = params.get('wt');
      // pk vem na query so para debug/log; o publicKey usado e o do Fintoc
      const mpPublicKey = params.get('pk');
      const publicKey   = params.get('fpk') || FINTOC_PUBLIC_KEY;
      const holderType  = params.get('ht') || 'individual';
      const product     = params.get('pr') || 'payments';

      const $title  = document.getElementById('title');
      const $lead   = document.getElementById('lead');
      const $pay    = document.getElementById('pay');
      const $status = document.getElementById('status');

      function showStatus(kind, msg) {
        $status.className = 'status show ' + kind;
        $status.textContent = msg;
      }

      function fatal(msg) {
        $pay.hidden = true;
        showStatus('error', msg);
      }

      if (!widgetToken) {
        fatal('Enlace inválido o incompleto. Solicita uno nuevo al equipo de Notify.');
        return;
      }

      // Bloqueia o estado da pagina apos o link expirar/cancelar — nao
      // adianta deixar o usuario reintentar, o widget_token vira invalido.
      function lockExpired(reason) {
        $title.textContent = 'Enlace expirado';
        $lead.textContent  = reason
          ? reason
          : 'Este enlace de pago ya no es válido. Solicita uno nuevo al equipo de Notify.';
        $pay.hidden = true;
        showStatus('error', 'El enlace expira a los 10 minutos o cuando el pago se cancela. Pedí uno nuevo.');
      }

      // Mapeia o erro da API Fintoc para uma acao de UI.
      // Formato observado:
      //   {error: {type, code, message, param, doc_url}}
      // ou diretamente {type, code, message, ...}
      function handleFintocError(err) {
        console.error('[Fintoc] error:', err);
        const inner = (err && err.error) ? err.error : err || {};
        const code = inner.code || (err && err.code);
        const message = inner.message || (err && err.message) || '';

        if (code === 'expired_widget_token' || /expired/i.test(message)) {
          lockExpired();
          return;
        }
        if (code === 'invalid_widget_token' || /invalid.*token/i.test(message)) {
          lockExpired('Este enlace de pago no es válido. Solicita uno nuevo al equipo de Notify.');
          return;
        }
        if (code === 'invalid_api_key') {
          $pay.disabled = false;
          $pay.textContent = 'Pagar con mi banco';
          showStatus('error', 'Error de configuración (clave inválida). Avisa al equipo de Notify.');
          return;
        }

        // Erro generico — permite reintentar.
        $pay.disabled = false;
        $pay.textContent = 'Pagar con mi banco';
        showStatus('error', message || 'Ocurrió un error al procesar el pago. Reintentá en unos segundos.');
      }

      function openWidget() {
        if (typeof Fintoc === 'undefined' || !Fintoc.create) {
          showStatus('error', 'No se pudo cargar Fintoc. Verifica tu conexión y recarga la página.');
          return;
        }

        $pay.disabled = true;
        $pay.textContent = 'Abriendo banco…';

        try {
          const widget = Fintoc.create({
            holderType: holderType,
            product: product,
            publicKey: publicKey,
            widgetToken: widgetToken,
            onSuccess: function (payment) {
              $title.textContent = 'Pago confirmado';
              $lead.textContent  = 'Tu transferencia fue procesada exitosamente. Ya podés cerrar esta ventana.';
              $pay.hidden = true;
              showStatus('success', 'Pago aprobado. Recibirás la confirmación por email.');
            },
            onExit: function () {
              $pay.disabled = false;
              $pay.textContent = 'Pagar con mi banco';
              showStatus('info', 'Cerraste el pago antes de finalizar. Podés reintentar mientras el enlace siga válido.');
            },
            onEvent: function (event) {
              // Telemetria leve: alguns SDKs do Fintoc emitem eventos
              // antes do onError quando o token expira (cancel via
              // /payment_intents/user_expire). Tratamos aqui tambem.
              console.debug('[Fintoc] event:', event);
              if (!event) return;
              const code = event.code || (event.error && event.error.code);
              if (code === 'expired_widget_token' || code === 'invalid_widget_token') {
                handleFintocError(event);
              }
            },
            onError: function (err) {
              handleFintocError(err);
            },
          });

          widget.open();
        } catch (err) {
          handleFintocError(err);
        }
      }

      // Captura erros nao tratados que podem vir do SDK via window.onerror
      // ou unhandledrejection (ex: fetch falhando dentro do iframe que
      // borbulha como rejection no parent).
      window.addEventListener('unhandledrejection', function (e) {
        const reason = e && e.reason;
        if (!reason) return;
        const code = reason.code || (reason.error && reason.error.code);
        if (code === 'expired_widget_token' || code === 'invalid_widget_token') {
          handleFintocError(reason);
          e.preventDefault();
        }
      });

      $pay.addEventListener('click', openWidget);
    })();
  </script>
</body>
</html>
